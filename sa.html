<!DOCTYPE html>
<html lang="ko">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Canvas Striker: HP System</title>
   <style>
      body {
         margin: 0; background-color: #111; color: white;
         display: flex; flex-direction: column; justify-content: center; align-items: center;
         height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
         overflow: hidden; user-select: none;
      }
      #settings {
         margin-bottom: 10px; background: #222; padding: 10px; border-radius: 5px;
         border: 1px solid #444; font-size: 13px; z-index: 100; display: flex; gap: 15px; align-items: center;
      }
      .file-input { display: flex; flex-direction: column; gap: 2px; }
      #game-container {
         position: relative; width: 400px; height: 600px;
         box-shadow: 0 0 20px rgba(0, 150, 255, 0.5);
         border: 2px solid #333; background: #000;
      }
      canvas { display: block; }
      #ui-layer {
         position: absolute; top: 0; left: 0; width: 100%; height: 100%;
         pointer-events: none; padding: 10px; box-sizing: border-box;
      }
      .hud { font-size: 16px; font-weight: bold; text-shadow: 1px 1px 2px black; }
      
      /* HP 바 스타일 */
      #player-hp-container {
         position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
         width: 150px; height: 8px; background: #333; border: 1px solid #0cf;
      }
      #player-hp-bar { width: 100%; height: 100%; background: #0cf; transition: width 0.2s; }

      #boss-hp-container {
         position: absolute; top: 40px; left: 10%; width: 80%; height: 10px;
         background: #333; border: 1px solid #fff; display: none;
      }
      #boss-hp-bar { width: 100%; height: 100%; background: #f00; transition: width 0.1s; }
      
      #msg-screen {
         position: absolute; top: 0; left: 0; width: 100%; height: 100%;
         background: rgba(0,0,0,0.7); display: flex; flex-direction: column;
         justify-content: center; align-items: center; pointer-events: auto;
      }
      button {
         margin-top: 20px; padding: 10px 20px; font-size: 16px; cursor: pointer;
         background: #0cf; border: none; font-weight: bold; border-radius: 5px;
      }
      button:hover { background: #0099cc; }
      .atk-btn { margin-top: 0; padding: 5px 10px; font-size: 12px; background: #f44; }
   </style>
</head>
<body>

   <div id="settings">
      <div class="file-input">
         플레이어: <input type="file" id="playerFile" accept="image/*">
      </div>
      <div class="file-input">
         적(Normal): <input type="file" id="enemyFile" accept="image/*">
      </div>
      <button class="atk-btn" onclick="upgradeAtk()">공격력 강화 (현재: <span id="atk-val">1</span>)</button>
   </div>

   <div id="game-container">
      <canvas id="gameCanvas" width="400" height="600"></canvas>
      
      <div id="ui-layer">
         <div id="score-disp" class="hud">SCORE: 0</div>
         <div id="bomb-disp" class="hud">BOMBS: 3 (Press Z)</div>
         <div id="player-hp-container"><div id="player-hp-bar"></div></div>
         <div id="boss-hp-container"><div id="boss-hp-bar"></div></div>
      </div>

      <div id="msg-screen">
         <h1 id="msg-title">CANVAS STRIKER</h1>
         <div id="msg-score" class="hud">Move: Arrows | Bomb: Z</div>
         <button onclick="startGame()">START GAME</button>
      </div>
   </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreDisp = document.getElementById('score-disp');
const bombDisp = document.getElementById('bomb-disp');
const bossContainer = document.getElementById('boss-hp-container');
const bossHpBar = document.getElementById('boss-hp-bar');
const playerHpBar = document.getElementById('player-hp-bar');
const msgScreen = document.getElementById('msg-screen');

let playerImg = new Image();
let isPlayerImgLoaded = false;
let enemyImg = new Image();
let isEnemyImgLoaded = false;
let globalDamage = 1;

document.getElementById('playerFile').addEventListener('change', (e) => {
   const reader = new FileReader();
   // 오류 수정됨: remove_46 -> onload
   reader.onload = (ev) => { 
       playerImg.onload = () => isPlayerImgLoaded = true; 
       playerImg.src = ev.target.result; 
   };
   if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
});

document.getElementById('enemyFile').addEventListener('change', (e) => {
   const reader = new FileReader();
   // 오류 수정됨: remove_46 -> onload
   reader.onload = (ev) => { 
       enemyImg.onload = () => isEnemyImgLoaded = true; 
       enemyImg.src = ev.target.result; 
   };
   if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
});

function upgradeAtk() {
   globalDamage++;
   document.getElementById('atk-val').innerText = globalDamage;
}

const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

let state = 'menu';
let frame = 0;
let score = 0;
let shake = 0;

let player, bullets, enemies, enemyBullets, particles, items, stars, boss;

function initPlayer() {
   return {
      x: 200, y: 500, radius: 8, speed: 5, power: 1, bombs: 3, invinc: 0,
      hp: 100, maxHp: 100,
      draw() {
         if (this.invinc > 0 && Math.floor(Date.now() / 100) % 2 === 0) return;
         ctx.save();
         ctx.translate(this.x, this.y);
         ctx.fillStyle = '#f80';
         ctx.beginPath(); ctx.arc(0, 15 + Math.random()*5, 4, 0, Math.PI*2); ctx.fill();

         if (isPlayerImgLoaded) {
           ctx.drawImage(playerImg, -20, -20, 40, 40);
         } else {
           ctx.fillStyle = '#ccc';
           ctx.beginPath();
           ctx.moveTo(0, -15); ctx.lineTo(15, 10); ctx.lineTo(5, 10); ctx.lineTo(5, 15);
           ctx.lineTo(-5, 15); ctx.lineTo(-5, 10); ctx.lineTo(-15, 10);
           ctx.closePath(); ctx.fill();
           ctx.fillStyle = '#0cf';
           ctx.beginPath(); ctx.ellipse(0, -2, 3, 6, 0, 0, Math.PI*2); ctx.fill();
         }
         ctx.restore();
      }
   };
}

// 플레이어 피격 처리 함수
function playerHit(damage) {
   if (player.invinc > 0) return;
   player.hp -= damage;
   player.invinc = 60; // 1초 무적
   shake = 10;
   playerHpBar.style.width = Math.max(0, (player.hp / player.maxHp) * 100) + '%';
   
   if (player.hp <= 0) die();
}

function spawnEnemy() {
   if (boss) return;
   let spawnRate = Math.max(20, 60 - Math.floor(score / 50));
   if (frame % spawnRate === 0) {
      let isElite = Math.random() > 0.8;
      enemies.push({
         x: Math.random() * (canvas.width - 40) + 20,
         y: -20,
         hp: isElite ? 10 + Math.floor(score/300) : 2,
         type: isElite ? 'elite' : 'normal',
         vx: (Math.random() - 0.5) * 2,
         vy: isElite ? 1.5 : 3,
         draw() {
           ctx.save();
           ctx.translate(this.x, this.y);
           if (this.type === 'elite') {
              ctx.fillStyle = '#90f';
              ctx.beginPath(); ctx.moveTo(0, 15); ctx.lineTo(15, -10); ctx.lineTo(-15, -10); ctx.fill();
              ctx.fillStyle = '#f0f'; ctx.fillRect(-5, -5, 10, 10);
           } else {
              if (isEnemyImgLoaded) {
                 ctx.drawImage(enemyImg, -15, -15, 30, 30);
              } else {
                 ctx.fillStyle = '#f44';
                 ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI, true); ctx.fill();
                 ctx.fillStyle = '#555'; ctx.fillRect(-12, 0, 24, 6);
              }
           }
           ctx.restore();
         }
      });
   }
}

function spawnBoss() {
   boss = {
      x: 200, y: -50, hp: 300, maxHp: 300, phase: 1, vx: 2, vy: 1, timer: 0,
      draw() {
         ctx.save();
         ctx.translate(this.x, this.y);
         ctx.fillStyle = this.hp < 100 ? '#800' : '#444';
         ctx.fillRect(-40, -20, 80, 40);
         ctx.fillStyle = '#222';
         ctx.fillRect(-50, -10, 10, 30); ctx.fillRect(40, -10, 10, 30);
         ctx.fillStyle = '#f00';
         ctx.beginPath(); ctx.arc(0, 10, 10, 0, Math.PI*2); ctx.fill();
         ctx.fillStyle = '#fff';
         if(Math.random()>0.5) { ctx.beginPath(); ctx.arc(0, 10, 5, 0, Math.PI*2); ctx.fill(); }
         ctx.restore();
      }
   };
   bossContainer.style.display = 'block';
}

function fireBomb() {
   if (player.bombs > 0 && state === 'playing') {
      player.bombs--;
      player.invinc = 120;
      shake = 30;
      bombDisp.innerText = `BOMBS: ${player.bombs} (Press Z)`;
      enemyBullets = [];
      enemies.forEach(e => { e.hp -= 50; });
      if (boss) boss.hp -= 50;
      for(let i=0; i<50; i++) {
         particles.push(createParticle(Math.random()*canvas.width, Math.random()*canvas.height, '#ffaa00', Math.random()*10+5));
      }
   }
}

function createParticle(x, y, color, speed) {
   return { x, y, vx: (Math.random()-0.5)*speed, vy: (Math.random()-0.5)*speed, life: 1.0, color };
}

function startGame() {
   player = initPlayer();
   bullets = []; enemies = []; enemyBullets = []; particles = []; items = []; boss = null;
   stars = Array.from({length: 50}, () => ({x: Math.random()*400, y: Math.random()*600, speed: Math.random()*2+1}));
   score = 0; frame = 0; shake = 0;
   state = 'playing';
   msgScreen.style.display = 'none';
   bossContainer.style.display = 'none';
   playerHpBar.style.width = '100%';
   bombDisp.innerText = `BOMBS: ${player.bombs} (Press Z)`;
   scoreDisp.innerText = `SCORE: ${score}`;
   requestAnimationFrame(gameLoop);
}

function gameLoop() {
   if (state !== 'playing') return;
   update();
   draw();
   requestAnimationFrame(gameLoop);
}

function update() {
   frame++;
   if (keys['ArrowLeft'] && player.x > 15) player.x -= player.speed;
   if (keys['ArrowRight'] && player.x < canvas.width - 15) player.x += player.speed;
   if (keys['ArrowUp'] && player.y > 15) player.y -= player.speed;
   if (keys['ArrowDown'] && player.y < canvas.height - 15) player.y += player.speed;
   if (keys['KeyZ']) { keys['KeyZ'] = false; fireBomb(); }
   if (player.invinc > 0) player.invinc--;

   if (frame % 8 === 0) {
      bullets.push({x: player.x, y: player.y - 15, vx: 0, vy: -12});
      if (player.power >= 2) {
         bullets.push({x: player.x - 10, y: player.y - 5, vx: -1.5, vy: -12});
         bullets.push({x: player.x + 10, y: player.y - 5, vx: 1.5, vy: -12});
      }
      if (player.power >= 3) {
         bullets.push({x: player.x - 15, y: player.y, vx: -3, vy: -10});
         bullets.push({x: player.x + 15, y: player.y, vx: 3, vy: -10});
      }
   }

   bullets.forEach(b => { b.x += b.vx; b.y += b.vy; });
   bullets = bullets.filter(b => b.y > -20 && b.x > -20 && b.x < canvas.width+20);

   if (score > 1500 && !boss) spawnBoss();

   enemies.forEach(e => {
      e.x += e.vx; e.y += e.vy;
      if (e.x < 15 || e.x > canvas.width - 15) e.vx *= -1;
      if (e.type === 'elite' && frame % 60 === 0) {
         let angle = Math.atan2(player.y - e.y, player.x - e.x);
         enemyBullets.push({x: e.x, y: e.y, vx: Math.cos(angle)*4, vy: Math.sin(angle)*4, r: 4, c: '#f0f'});
      }
   });

   if (boss) {
      if (boss.y < 80) boss.y += boss.vy;
      else {
         boss.x += boss.vx;
         if (boss.x < 50 || boss.x > canvas.width - 50) boss.vx *= -1;
         boss.timer++;
         boss.phase = boss.hp > 200 ? 1 : (boss.hp > 100 ? 2 : 3);
         if (boss.timer % (boss.phase === 3 ? 30 : 50) === 0) {
           if (boss.phase === 1) {
              for(let i=0; i<8; i++) {
                 let a = (Math.PI*2/8) * i;
                 enemyBullets.push({x: boss.x, y: boss.y+10, vx: Math.cos(a)*3, vy: Math.sin(a)*3, r: 5, c:'#f00'});
              }
           } else if (boss.phase === 2) {
              let angle = Math.atan2(player.y - (boss.y+10), player.x - boss.x);
              enemyBullets.push({x: boss.x, y: boss.y+10, vx: Math.cos(angle)*5, vy: Math.sin(angle)*5, r: 6, c:'#0ff'});
           } else {
              enemyBullets.push({x: boss.x-40, y: boss.y+10, vx: 0, vy: 6, r: 4, c:'#ff0'});
              enemyBullets.push({x: boss.x+40, y: boss.y+10, vx: 0, vy: 6, r: 4, c:'#ff0'});
              let angle = Math.atan2(player.y - boss.y, player.x - boss.x);
              enemyBullets.push({x: boss.x, y: boss.y+10, vx: Math.cos(angle)*6, vy: Math.sin(angle)*6, r: 6, c:'#f00'});
           }
         }
      }
   }

   for (let i = bullets.length - 1; i >= 0; i--) {
      let b = bullets[i];
      let hit = false;
      if (boss && Math.abs(b.x - boss.x) < 40 && Math.abs(b.y - boss.y) < 30) {
         boss.hp -= globalDamage; hit = true;
         for(let p=0; p<3; p++) particles.push(createParticle(b.x, b.y, '#fff', 3));
         bossHpBar.style.width = Math.max(0, (boss.hp / boss.maxHp) * 100) + '%';
         if (boss.hp <= 0) {
           score += 5000; shake = 30;
           for(let p=0; p<100; p++) particles.push(createParticle(boss.x, boss.y, '#f00', 8));
           boss = null; bossContainer.style.display = 'none';
         }
      }
      if (!hit) {
         for (let j = enemies.length - 1; j >= 0; j--) {
           let e = enemies[j];
           if (Math.hypot(b.x - e.x, b.y - e.y) < 15) {
              e.hp -= globalDamage; hit = true;
              particles.push(createParticle(b.x, b.y, '#ff0', 3));
              if (e.hp <= 0) {
                 score += (e.type==='elite'?200:50);
                 if(Math.random() > 0.9) items.push({x: e.x, y: e.y});
                 for(let p=0; p<15; p++) particles.push(createParticle(e.x, e.y, e.type==='elite'?'#f0f':'#f80', 5));
                 enemies.splice(j, 1);
              }
              break;
           }
         }
      }
      if (hit) bullets.splice(i, 1);
   }

   if (player.invinc <= 0) {
      enemyBullets.forEach(eb => {
         if (Math.hypot(player.x - eb.x, player.y - eb.y) < player.radius + eb.r - 2) playerHit(15);
      });
      enemies.forEach(e => {
         if (Math.hypot(player.x - e.x, player.y - e.y) < player.radius + 10) playerHit(25);
      });
      if (boss && Math.abs(player.x - boss.x) < 45 && Math.abs(player.y - boss.y) < 35) playerHit(50);
   }

   enemyBullets.forEach(eb => { eb.x += eb.vx; eb.y += eb.vy; });
   enemyBullets = enemyBullets.filter(eb => eb.y < canvas.height+20 && eb.y > -20 && eb.x > -20 && eb.x < canvas.width+20);
   enemies = enemies.filter(e => e.y < canvas.height + 30);
   items.forEach((it, i) => {
      it.y += 2;
      if (Math.hypot(player.x - it.x, player.y - it.y) < 20) {
         if (player.power < 3) player.power++; else score += 500;
         player.hp = Math.min(player.maxHp, player.hp + 5);
         playerHpBar.style.width = (player.hp / player.maxHp * 100) + '%';
         items.splice(i, 1);
      }
   });
   particles.forEach((p, i) => {
      p.x += p.vx; p.y += p.vy; p.life -= 0.05;
      if (p.life <= 0) particles.splice(i, 1);
   });
   stars.forEach(s => { s.y += s.speed; if (s.y > canvas.height) { s.y = 0; s.x = Math.random()*canvas.width; } });
   scoreDisp.innerText = `SCORE: ${score}`;
   if (shake > 0) shake--;
   spawnEnemy();
}

function die() {
   state = 'gameover';
   for(let p=0; p<50; p++) particles.push(createParticle(player.x, player.y, '#0cf', 8));
   document.getElementById('msg-score').innerText = `Final Score: ${score}`;
   setTimeout(() => { msgScreen.style.display = 'flex'; }, 500);
}

function draw() {
   ctx.fillStyle = '#000510';
   ctx.fillRect(0, 0, canvas.width, canvas.height);
   ctx.save();
   if (shake > 0) ctx.translate((Math.random()-0.5)*10, (Math.random()-0.5)*10);
   ctx.fillStyle = '#fff';
   stars.forEach(s => { ctx.globalAlpha = s.speed / 3; ctx.fillRect(s.x, s.y, s.speed, s.speed); });
   ctx.globalAlpha = 1.0;
   if (state === 'playing') player.draw();
   if (boss) boss.draw();
   enemies.forEach(e => e.draw());
   ctx.fillStyle = '#0f0';
   bullets.forEach(b => ctx.fillRect(b.x-2, b.y-6, 4, 12));
   enemyBullets.forEach(eb => { ctx.fillStyle = eb.c; ctx.beginPath(); ctx.arc(eb.x, eb.y, eb.r, 0, Math.PI*2); ctx.fill(); });
   items.forEach(it => {
      ctx.fillStyle = '#0f0'; ctx.beginPath(); ctx.arc(it.x, it.y, 10, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000'; ctx.font = '12px Arial'; ctx.fillText('P', it.x-3, it.y+4);
   });
   particles.forEach(p => {
      ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0, p.life);
      ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
   });
   ctx.restore();
}

ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
msgScreen.style.display = 'flex';
document.getElementById('msg-title').innerText = "CANVAS STRIKER";
document.getElementById('msg-score').innerText = "Move: Arrows | Bomb: Z";
</script>
</body>
</html>
